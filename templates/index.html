<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Role Predictor</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<div class="logo">
💼
</div>

<h1>Job Role Predictor</h1>

<p class="subtitle">
Predict the most suitable job role using Machine Learning
</p>

<form method="POST">

<textarea
name="resume"
placeholder="Paste your complete resume or skills here..."
required></textarea>

<button type="submit">
🚀 Predict Job Role
</button>

</form>

{% if prediction %}

<div class="result">

<h2>✅ Prediction Result</h2>

<h3>{{ prediction }}</h3>

</div>

{% endif %}

<div class="footer">

Developed by <span>Navya</span>

<br><br>

Machine Learning • Flask • Python • Scikit-learn

</div>

</div>

</body>

</html>
